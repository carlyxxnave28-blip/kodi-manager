
<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#080d1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>KodiManager 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d1a;--c1:#111827;--c2:#1a2234;--c3:#1f2937;
  --gr:#10b981;--gr2:#059669;--am:#f59e0b;--rd:#ef4444;--bl:#6366f1;
  --tx:#f1f5f9;--tx2:#9ca3af;--tx3:#6b7280;--bdr:#1f2937;
}
html,body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100svh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none}
button{cursor:pointer}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gr);border-radius:3px}
.app{min-height:100svh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:60;background:rgba(8,13,26,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.tinner{max-width:640px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.bico{width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,var(--gr),var(--gr2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem}
.bname{font-size:.92rem;font-weight:800}
.bsub{font-size:.62rem;color:var(--tx3);margin-top:1px}
.tright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sync-pill{font-size:.62rem;font-weight:700;border-radius:20px;padding:3px 8px;display:none}
.sync-pill.show{display:inline-block}
.sync-ok{color:var(--gr);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.sync-ing{color:var(--am);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.sync-err{color:var(--rd);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.btn-ico{background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--tx2);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.main{flex:1;max-width:640px;width:100%;margin:0 auto;padding:12px 13px calc(90px + env(safe-area-inset-bottom))}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(6,10,20,.98);border-top:1px solid var(--bdr);display:flex;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:60;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--tx3);font-size:.6rem;font-weight:700;padding:3px 2px;position:relative}
.nb.on{color:var(--gr)}
.nb-badge{position:absolute;top:0;right:calc(50% - 18px);background:var(--rd);color:#fff;border-radius:20px;padding:1px 5px;font-size:.55rem;font-weight:800;line-height:1.4;display:none}
.nb-badge.show{display:block}
.fab{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));right:14px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gr),var(--gr2));border:none;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(16,185,129,.38);z-index:59;font-size:1.5rem;line-height:1}
.fab:active{transform:scale(.88)}
.page{display:none;flex-direction:column;gap:11px;animation:fu .22s ease}
.page.active{display:flex}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.scard{background:var(--c1);border:1px solid var(--bdr);border-top:2.5px solid var(--ac);border-radius:13px;padding:12px 11px}
.sico{font-size:1.1rem;margin-bottom:3px}.sval{font-size:1.6rem;font-weight:900;color:var(--ac);line-height:1}
.slbl{font-size:.67rem;color:var(--tx3);font-weight:600;margin-top:2px}
.abox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:5px}
.atitle{font-size:.8rem;font-weight:700;color:var(--am)}
.arow{font-size:.73rem;color:#d1d5db;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.alink{background:none;border:none;color:var(--gr);font-size:.7rem;font-weight:700;text-decoration:underline;padding:0;cursor:pointer}
.sbar{display:flex;align-items:center;gap:9px;background:var(--c1);border:1.5px solid var(--bdr);border-radius:12px;padding:9px 13px}
.sbar input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;min-width:0}
.sbar input::placeholder{color:var(--tx3)}
.stitle{font-size:1rem;font-weight:700}.ssub{font-size:.7rem;color:var(--tx3);margin-top:2px}
.clist{display:flex;flex-direction:column;gap:8px}
.card{background:var(--c1);border:1px solid var(--bdr);border-left:3px solid var(--lc,var(--bdr));border-radius:13px;padding:13px;cursor:pointer}
.card:active{opacity:.8}
.crow{display:flex;align-items:center;gap:10px}
.cinfo{flex:1;min-width:0}
.cname{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csub{font-size:.7rem;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdates{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:9px}
.dbox{background:var(--c2);border-radius:9px;padding:6px 9px}
.dlbl{font-size:.6rem;color:var(--tx3);margin-bottom:2px}.dval{font-size:.78rem;font-weight:600}
.av{width:40px;height:40px;min-width:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:.68rem;font-weight:700;flex-shrink:0;white-space:nowrap}
.tg{background:rgba(16,185,129,.12);color:var(--gr);border:1px solid rgba(16,185,129,.25)}
.ta{background:rgba(245,158,11,.12);color:var(--am);border:1px solid rgba(245,158,11,.25)}
.tr{background:rgba(239,68,68,.12);color:var(--rd);border:1px solid rgba(239,68,68,.25)}
.tgr{background:rgba(156,163,175,.08);color:var(--tx2);border:1px solid rgba(156,163,175,.18)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.chip{background:var(--c2);border-radius:9px;padding:8px 10px}
.chip.sm{padding:5px 8px}
.clbl{font-size:.6rem;color:var(--tx3);margin-bottom:2px}
.cval{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip.sm .cval{font-size:.72rem}
.det-head{background:var(--c1);border:1px solid var(--bdr);border-radius:16px;padding:15px;display:flex;align-items:center;gap:12px}
.det-av{width:52px;height:52px;min-width:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(5,150,105,.07));color:var(--gr);border:1px solid rgba(16,185,129,.22)}
.det-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.det-name{font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.det-sub{font-size:.74rem;color:var(--tx3)}
.sbar2{border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;font-weight:600;gap:8px;flex-wrap:wrap}
.sb-g{background:rgba(16,185,129,.07);color:var(--gr);border:1px solid rgba(16,185,129,.17)}
.sb-a{background:rgba(245,158,11,.07);color:var(--am);border:1px solid rgba(245,158,11,.17)}
.sb-r{background:rgba(239,68,68,.07);color:var(--rd);border:1px solid rgba(239,68,68,.17)}
.sb-gr{background:rgba(156,163,175,.05);color:var(--tx2);border:1px solid rgba(156,163,175,.13)}
.debt-bar{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.13);border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--rd);font-weight:600;flex-wrap:wrap;gap:5px}
.tabs{display:flex;background:var(--c1);border-radius:12px;padding:3px;gap:3px;overflow-x:auto}
.tbt{flex:1;min-width:max-content;padding:8px 6px;border-radius:9px;border:none;background:none;color:var(--tx3);font-weight:600;font-size:.73rem;white-space:nowrap}
.tbt.on{background:var(--c3);color:var(--gr)}
.tab-pane{display:none;flex-direction:column;gap:8px}
.tab-pane.active{display:flex}
.pcard{background:var(--c1);border:1px solid var(--bdr);border-left:3px solid var(--gr);border-radius:13px;padding:12px}
.ptop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.pamt{font-size:.98rem;font-weight:700;color:var(--gr)}
.pdate{font-size:.72rem;color:var(--tx3);margin-top:2px}
.pnote{font-size:.72rem;color:var(--tx2);margin-top:3px;font-style:italic}
.prno{font-size:.68rem;background:rgba(16,185,129,.1);color:var(--gr);padding:2px 6px;border-radius:5px;font-weight:600;display:inline-block;margin-top:3px}
.pright{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.pnum{font-size:.64rem;color:var(--tx3)}
.pacts{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;justify-content:flex-end}
.sbtn{border-radius:7px;padding:4px 8px;font-size:.68rem;font-weight:700;border:1px solid;background:none;cursor:pointer}
.sbt-b{color:var(--bl);border-color:rgba(99,102,241,.3)}
.sbt-a{color:var(--am);border-color:rgba(245,158,11,.3)}
.sbt-r{color:var(--rd);border-color:rgba(239,68,68,.22)}
.doccard{background:var(--c1);border:1px solid var(--bdr);border-radius:13px;padding:12px}
.doc-name{font-weight:600;font-size:.9rem;margin-bottom:3px}
.doc-type{font-size:.7rem;color:var(--tx3);margin-bottom:7px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--c2);font-size:.78rem;flex-wrap:wrap;gap:4px}
.plbl{color:var(--tx3);font-size:.7rem}.pok{color:var(--gr);font-weight:700}
.btn{border:none;border-radius:11px;padding:12px 16px;font-weight:700;font-size:16px;text-align:center;width:100%;display:block;cursor:pointer}
.btn-g{background:linear-gradient(135deg,var(--gr),var(--gr2));color:#fff}
.btn-g:active{opacity:.85}
.btn-gh{background:none;border:1.5px solid var(--c3);color:var(--tx2)}
.btn-am{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);color:var(--am)}
.btn-rd{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.22);color:var(--rd)}
.btn-lk{background:rgba(239,68,68,.08);border:none;color:var(--rd)}
.btn-ul{background:rgba(16,185,129,.08);border:none;color:var(--gr)}
.btn-em{background:rgba(16,185,129,.07);border:1.5px solid rgba(16,185,129,.2);color:var(--gr);font-weight:700;font-size:.85rem;text-decoration:none;display:block;text-align:center}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--gr);font-weight:700;font-size:.88rem;padding:0;margin-bottom:4px;cursor:pointer}
.divider{height:1px;background:var(--bdr);margin:4px 0}
.empty{text-align:center;padding:40px 16px;color:var(--tx3)}
.eico{font-size:2.5rem;margin-bottom:10px}.et{font-weight:700;font-size:.95rem;color:var(--tx2);margin-bottom:5px}.es{font-size:.78rem}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:560px){.overlay{align-items:center;padding:16px}}
.modal{background:#0c1422;border:1px solid var(--bdr);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:18px;padding-bottom:calc(18px + env(safe-area-inset-bottom));max-height:93svh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;animation:mup .22s ease}
@keyframes mup{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:560px){.modal{border-radius:18px;padding-bottom:18px}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.mt{font-size:1rem;font-weight:800}
.xb{background:var(--c3);border:none;color:var(--tx2);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:3px}
.field{display:flex;flex-direction:column;gap:4px}
.fl{font-size:.72rem;color:var(--tx2);font-weight:600}
.fh{font-size:.64rem;color:var(--tx3);margin-top:2px}
.inp{background:var(--c2);border:1.5px solid var(--bdr);border-radius:10px;padding:11px 12px;color:var(--tx);font-size:16px!important;outline:none;width:100%;transition:border-color .18s}
.inp:focus{border-color:var(--gr)}
.i2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.uzone{display:block;background:var(--c2);border:1.5px dashed var(--c3);border-radius:10px;padding:15px;text-align:center;color:var(--tx3);font-size:.82rem;transition:border-color .18s;cursor:pointer}
.uzone.ok{border-color:rgba(16,185,129,.4);color:var(--gr)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:9px 16px;border-radius:11px;z-index:200;font-weight:700;font-size:.82rem;box-shadow:0 4px 18px rgba(0,0,0,.5);white-space:nowrap;max-width:93vw;text-align:center;display:none}
.toast.show{display:block;animation:td .25s ease}
@keyframes td{from{transform:translateX(-50%) translateY(-10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.tok{background:#064e3b;color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}
.terr{background:#7f1d1d;color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.loading-ico{font-size:3rem}
.loading-txt{font-size:.9rem;color:var(--tx2);font-weight:600}
.spinner{width:32px;height:32px;border:3px solid var(--c3);border-top-color:var(--gr);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.inote{background:var(--c2);border-radius:10px;padding:11px;font-size:.74rem;color:var(--tx3);line-height:1.75}
.inote b{color:var(--tx)}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-ico">🏠</div>
  <div class="spinner"></div>
  <div class="loading-txt">Inaunganisha na database...</div>
</div>

<div class="app" style="display:none" id="main-app">
  <div class="topbar">
    <div class="tinner">
      <div class="brand">
        <div class="bico">🏠</div>
        <div>
          <div class="bname">KodiManager</div>
          <div class="bsub" id="brand-sub">0 wapangaji · 0 wadaiwa</div>
        </div>
      </div>
      <div class="tright">
        <div class="sync-pill" id="sync-pill">🔄 Inasync...</div>
        <button class="btn-ico" onclick="openModal('cfg')">⚙️</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="page active" id="page-home">
      <div class="sgrid">
        <div class="scard" style="--ac:#10b981"><div class="sico">✅</div><div class="sval" id="stat-paying">0</div><div class="slbl">Wanaolipa</div></div>
        <div class="scard" style="--ac:#f59e0b"><div class="sico">⚠️</div><div class="sval" id="stat-soon">0</div><div class="slbl">Karibu Kwisha</div></div>
        <div class="scard" style="--ac:#ef4444"><div class="sico">🔴</div><div class="sval" id="stat-owed">0</div><div class="slbl">Wadaiwa</div></div>
        <div class="scard" style="--ac:#818cf8"><div class="sico">👥</div><div class="sval" id="stat-all">0</div><div class="slbl">Wapangaji</div></div>
      </div>
      <div class="abox" id="alert-box" style="display:none"></div>
      <div class="sbar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-home" placeholder="Tafuta jina au chumba..." oninput="renderHome()"/>
      </div>
      <div><div class="stitle">Wapangaji Wote</div><div class="ssub" id="sync-status">🔴 Inaungana...</div></div>
      <div class="clist" id="home-list"></div>
    </div>

    <div class="page" id="page-ov">
      <div><div class="stitle">Maelezo ya Wote</div><div class="ssub">Rekodi kamili ya kila mpangaji</div></div>
      <div class="sbar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-ov" placeholder="Tafuta mpangaji..." oninput="renderOv()"/>
      </div>
      <div class="clist" id="ov-list"></div>
    </div>

    <div class="page" id="page-def">
      <div><div class="stitle" style="color:#ef4444">⚠️ Wadaiwa</div><div class="ssub">Wapangaji ambao muda wa kodi umekwisha</div></div>
      <div class="clist" id="def-list"></div>
    </div>

    <div class="page" id="page-detail">
      <button class="back-btn" onclick="showPage('home')">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Rudi
      </button>
      <div id="detail-content"></div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="openModal('addT')">+</button>

  <div class="bnav">
    <button class="nb on" id="nb-home" onclick="showPage('home')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#10b981" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Nyumbani</span>
    </button>
    <button class="nb" id="nb-ov" onclick="showPage('ov')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><rect x="2" y="7" width="4" height="15"/><rect x="10" y="3" width="4" height="19"/><rect x="18" y="11" width="4" height="11"/></svg>
      <span>Maelezo</span>
    </button>
    <button class="nb" id="nb-def" onclick="showPage('def')">
      <span class="nb-badge" id="def-badge">0</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Wadaiwa</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()" id="modal-box"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   FIREBASE CONFIG — Realtime Database
══════════════════════════════════════════════ */
const FB_URL = 'https://kodimnager-default-rtdb.firebaseio.com';
const CFG_KEY = 'kodi_cfg_v3';

let tenants = [];
let cfg = {};
let currentTenantId = null;
let currentTab = 'pay';
let isOnline = false;

/* ── FIREBASE REST API ── */
async function fbGet(path) {
  const r = await fetch(`${FB_URL}${path}.json`);
  if (!r.ok) throw new Error('Firebase GET failed');
  return r.json();
}
async function fbSet(path, data) {
  const r = await fetch(`${FB_URL}${path}.json`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Firebase SET failed');
  return r.json();
}
async function fbDelete(path) {
  await fetch(`${FB_URL}${path}.json`, {method:'DELETE'});
}
async function fbPush(path, data) {
  const r = await fetch(`${FB_URL}${path}.json`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Firebase PUSH failed');
  return r.json();
}

/* ── SYNC ── */
function showSync(state) {
  const p = document.getElementById('sync-pill');
  p.className = 'sync-pill show sync-' + state;
  p.textContent = state==='ok' ? '🟢 Live' : state==='ing' ? '🔄 Sync...' : '🔴 Offline';
  if (state === 'ok') setTimeout(() => p.classList.remove('show'), 3000);
}

async function loadFromFirebase() {
  try {
    showSync('ing');
    const data = await fbGet('/tenants');
    if (data) {
      tenants = Object.entries(data).map(([fbKey, t]) => ({...t, fbKey}));
    } else {
      tenants = [];
    }
    isOnline = true;
    showSync('ok');
    document.getElementById('sync-status').textContent = '🟢 Live — inabadilika kiotomatiki kwenye simu zote';
  } catch(e) {
    isOnline = false;
    showSync('err');
    document.getElementById('sync-status').textContent = '🔴 Hakuna mtandao — jaribu tena';
    // fallback to local
    try { tenants = JSON.parse(localStorage.getItem('kodi_backup')||'[]'); } catch {}
  }
}

async function saveTenant(t) {
  showSync('ing');
  try {
    if (t.fbKey) {
      await fbSet('/tenants/' + t.fbKey, stripFbKey(t));
    } else {
      const res = await fbPush('/tenants', stripFbKey(t));
      t.fbKey = res.name;
    }
    showSync('ok');
    // Local backup
    localStorage.setItem('kodi_backup', JSON.stringify(tenants));
    return true;
  } catch(e) {
    showSync('err');
    toast('❌ Imeshindwa kuhifadhi — angalia mtandao', true);
    return false;
  }
}

async function deleteTenantFromFB(fbKey) {
  try { await fbDelete('/tenants/' + fbKey); } catch {}
}

function stripFbKey(t) {
  const {fbKey, ...rest} = t;
  return rest;
}

/* ── REALTIME LISTENER using SSE ── */
let sseSource = null;
function startRealtimeSync() {
  if (sseSource) sseSource.close();
  try {
    sseSource = new EventSource(`${FB_URL}/tenants.json?orderBy="$key"`);
    sseSource.onopen = () => {
      isOnline = true;
      showSync('ok');
    };
    sseSource.addEventListener('put', e => {
      const d = JSON.parse(e.data);
      if (d.data === null) {
        tenants = [];
      } else if (typeof d.data === 'object') {
        tenants = Object.entries(d.data).map(([fbKey,t]) => ({...t, fbKey}));
      }
      autoLock();
      renderAll();
      localStorage.setItem('kodi_backup', JSON.stringify(tenants));
    });
    sseSource.addEventListener('patch', e => {
      const d = JSON.parse(e.data);
      if (d.data) {
        Object.entries(d.data).forEach(([fbKey, val]) => {
          if (val === null) {
            tenants = tenants.filter(t => t.fbKey !== fbKey);
          } else {
            const idx = tenants.findIndex(t => t.fbKey === fbKey);
            if (idx >= 0) tenants[idx] = {...val, fbKey};
            else tenants.push({...val, fbKey});
          }
        });
        autoLock();
        renderAll();
        localStorage.setItem('kodi_backup', JSON.stringify(tenants));
      }
    });
    sseSource.onerror = () => {
      isOnline = false;
      showSync('err');
      document.getElementById('sync-status').textContent = '🔴 Hakuna mtandao';
    };
  } catch(e) {}
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
const fmt = d => d ? new Date(d).toLocaleDateString('en-TZ',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const tsh = n => n ? 'TSh ' + Number(n).toLocaleString() : 'TSh 0';
const addM = (s,n) => { const d=new Date(s); d.setMonth(d.getMonth()+Math.floor(n)); return d; };
const daysTo = d => { if(!d)return null; const t=new Date();t.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.floor((e-t)/86400000); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ── RENT CALC ── */
function calcExpiry(t) {
  const {moveInDate,rentAmount,payments=[],rentDuration=1} = t;
  if (!moveInDate || !rentAmount) return null;
  const amt = parseFloat(rentAmount)||0;
  if (!amt) return null;
  let months = 0;
  payments.forEach(p => { months += (parseFloat(p.amount)||0) / amt; });
  return addM(moveInDate, months);
}

function getStatus(t) {
  const dur = parseInt(t.rentDuration)||1;
  const hasPaid = (t.payments||[]).length > 0;
  const expiry = hasPaid ? calcExpiry(t) : addM(t.moveInDate||new Date(), dur);
  if (!t.moveInDate) return {l:'Hajalipa',c:'gr',days:null,exp:null};
  const days = daysTo(expiry);
  if (t.isLocked) return {l:'Imefungwa',c:'r',days,exp:expiry};
  if (days < 0) return {l:hasPaid?'Imedaiwa':'Hajalipa (Deni)',c:'r',days,exp:expiry};
  if (days <= 7) return {l:'Karibu Kwisha',c:'a',days,exp:expiry};
  if (!hasPaid) return {l:'Hajalipa',c:'gr',days,exp:expiry};
  return {l:'Imelipiwa',c:'g',days,exp:expiry};
}

function getPeriods(t) {
  const {moveInDate,rentAmount,payments=[]} = t;
  if (!moveInDate||!rentAmount) return [];
  const amt = parseFloat(rentAmount)||0;
  const list = []; let cursor = new Date(moveInDate);
  payments.forEach((p,i) => {
    const paid = parseFloat(p.amount)||0;
    const months = amt>0 ? paid/amt : 1;
    const end = addM(cursor.toISOString(), months);
    list.push({num:i+1,start:new Date(cursor),end,pay:p,months:Math.round(months*10)/10});
    cursor = new Date(end);
  });
  return list;
}

const tagCls = c => ({g:'tg',a:'ta',r:'tr',gr:'tgr'}[c]||'tgr');
const colOf  = c => ({g:'#10b981',a:'#f59e0b',r:'#ef4444',gr:'#6b7280'}[c]||'#6b7280');
const sbCls  = c => ({g:'sb-g',a:'sb-a',r:'sb-r',gr:'sb-gr'}[c]||'sb-gr');

/* ── AUTO LOCK ── */
function autoLock() {
  tenants.forEach(t => {
    const s = getStatus(t);
    if (s.days!==null && s.days<-7 && !t.isLocked) {
      t.isLocked = true;
      saveTenant(t);
    }
  });
}

/* ── TOAST ── */
let toastT;
function toast(msg,err=false) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(err?'terr':'tok');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),3200);
}

/* ── NAVIGATION ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nb-'+id);
  if(nb)nb.classList.add('on');
  document.getElementById('fab').style.display=(id==='detail')?'none':'flex';
  updateNavIcons(id);
  if(id==='home')renderHome();
  if(id==='ov')renderOv();
  if(id==='def')renderDef();
}

function updateNavIcons(a) {
  const h=document.querySelector('#nb-home svg');
  const o=document.querySelector('#nb-ov svg');
  const d=document.querySelector('#nb-def svg');
  if(h){h.setAttribute('fill',a==='home'?'#10b981':'none');h.setAttribute('stroke',a==='home'?'#10b981':'#6b7280');}
  if(o)o.setAttribute('stroke',a==='ov'?'#10b981':'#6b7280');
  if(d)d.setAttribute('stroke',a==='def'?'#ef4444':'#6b7280');
}

function renderAll() {
  const cur = document.querySelector('.page.active')?.id?.replace('page-','');
  if(cur==='home')renderHome();
  if(cur==='ov')renderOv();
  if(cur==='def')renderDef();
  if(cur==='detail')renderDetail();
  const defs=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<0;});
  const badge=document.getElementById('def-badge');
  badge.textContent=defs.length;
  badge.classList.toggle('show',defs.length>0);
  document.getElementById('brand-sub').textContent=`${tenants.length} wapangaji · ${defs.length} wadaiwa`;
}

/* ── DETAIL ── */
function openDetail(id) {
  currentTenantId=id; currentTab='pay';
  showPage('detail'); renderDetail();
}

function renderDetail() {
  const t=tenants.find(x=>x.id===currentTenantId);
  if(!t){showPage('home');return;}
  const s=getStatus(t),tc=tagCls(s.c),bc=sbCls(s.c);
  const total=t.payments.reduce((x,p)=>x+(parseFloat(p.amount)||0),0);
  const isOv=s.days!==null&&s.days<0;
  const debt=isOv?Math.ceil(Math.abs(s.days)/30.44)*(parseFloat(t.rentAmount)||0):0;
  let h=`
    <div class="det-head">
      <div class="det-av">${esc(t.name[0].toUpperCase())}</div>
      <div class="det-info">
        <div class="det-name">${esc(t.name)}${t.isLocked?' 🔒':''}</div>
        <div class="det-sub">Chumba ${esc(t.room)}${t.phone?' · '+esc(t.phone):''}</div>
        <span class="tag ${tc}" style="margin-top:4px">${esc(s.l)}</span>
      </div>
    </div>
    <div class="cgrid">
      ${chip('📞 Simu',t.phone||'—')}
      ${chip('💰 Kodi/Mwezi',tsh(t.rentAmount),'#10b981')}
      ${chip('📅 Alihamia',fmt(t.moveInDate),'#818cf8')}
      ${chip('💳 Jumla Lilipiwa',tsh(total),'#10b981')}
      ${t.email?chip('📧 Email',t.email):''}
      ${chip('📋 Malipo',t.payments.length+' risiti')}
    </div>
    <div class="sbar2 ${bc}">
      <span>${isOv?'⚠️ Imekwisha siku '+Math.abs(s.days)+' zilizopita':s.days===0?'⏰ Inaisha leo!':s.c==='gr'?'📅 Malipo ya kwanza inatakiwa':'📅 Siku '+s.days+' zimebaki'}</span>
      <span style="font-weight:700;flex-shrink:0">${fmt(s.exp)}</span>
    </div>`;
  if(debt>0)h+=`<div class="debt-bar"><span>📛 Deni takriban: ${tsh(debt)}</span>${t.isLocked?'<span style="background:rgba(239,68,68,.15);padding:2px 7px;border-radius:7px;font-size:.72rem">🔒 Imefungwa</span>':''}</div>`;
  if(t.email)h+=`<a href="${tMail(t)}" class="btn btn-em">📧 Tuma ${isOv?'Notisi ya Deni':'Ukumbusho'} kwa ${esc(t.name)}</a>`;
  h+=`<div class="b2">
    <button class="btn btn-g" onclick="openModal('addP')">+ Ongeza Malipo</button>
    <button class="btn ${t.isLocked?'btn-ul':'btn-lk'}" onclick="toggleLock('${t.id}')">${t.isLocked?'🔓 Fungua':'🔒 Funga'}</button>
  </div>
  <button class="btn btn-am" onclick="openModal('editT')">✏️ Hariri Maelezo ya Mpangaji</button>
  <div class="tabs">
    <button class="tbt${currentTab==='pay'?' on':''}" onclick="switchTab('pay')">💳 Malipo (${t.payments.length})</button>
    <button class="tbt${currentTab==='hist'?' on':''}" onclick="switchTab('hist')">📅 Historia (${getPeriods(t).length})</button>
    <button class="tbt${currentTab==='doc'?' on':''}" onclick="switchTab('doc')">📄 Hati (${(t.documents||[]).length})</button>
  </div>`;

  // Malipo tab
  h+=`<div class="tab-pane${currentTab==='pay'?' active':''}" id="tab-pay">`;
  if(!t.payments.length)h+=emptyEl('💳','Hakuna malipo bado',"Gusa 'Ongeza Malipo' kurekodi malipo");
  else{
    h+='<div class="clist">'+[...t.payments].reverse().map((p,i)=>{
      const num=t.payments.length-i;
      return`<div class="pcard"><div class="ptop">
        <div style="flex:1;min-width:0">
          <div class="pamt">${tsh(p.amount)}</div>
          <div class="pdate">Tarehe: ${fmt(p.date)}</div>
          ${p.notes?'<div class="pnote">'+esc(p.notes)+'</div>':''}
          ${p.receiptNo?'<div class="prno">Risiti #'+esc(p.receiptNo)+'</div>':''}
        </div>
        <div class="pright">
          <div class="pnum">Malipo ${num}</div>
          <div class="pacts">
            ${p.receiptImage?`<button class="sbtn sbt-b" onclick="viewImg('${p.id}','pay')">📄 Risiti</button>`:''}
            <button class="sbtn sbt-a" onclick="editPayment('${p.id}')">✏️</button>
            <button class="sbtn sbt-r" onclick="delPayment('${p.id}')">🗑️</button>
          </div>
        </div>
      </div></div>`;
    }).join('')+'</div>';
  }
  h+='</div>';

  // Historia tab
  const periods=getPeriods(t);
  h+=`<div class="tab-pane${currentTab==='hist'?' active':''}" id="tab-hist">`;
  h+=`<div style="font-size:.72rem;color:var(--tx3);margin-bottom:8px">Kodi inahesabiwa kutoka siku ya kuhamia (${fmt(t.moveInDate)}). Kodi: ${tsh(t.rentAmount)}/mwezi.</div>`;
  if(!periods.length)h+=emptyEl('📅','Hakuna historia','Ongeza malipo kuona historia');
  else h+=periods.map(p=>`<div class="prow"><div><div class="plbl">Kipindi ${p.num} (miezi ${p.months})</div><div style="font-size:.72rem;color:var(--tx2)">${fmt(p.start)} → ${fmt(p.end)}</div></div><div class="pok">✅ ${tsh(p.pay.amount)}</div></div>`).join('');
  h+='</div>';

  // Hati tab
  const docs=t.documents||[];
  h+=`<div class="tab-pane${currentTab==='doc'?' active':''}" id="tab-doc">`;
  h+=`<button class="btn btn-gh" style="margin-bottom:8px" onclick="openModal('addD')">+ Ongeza Hati / Kitambulisho</button>`;
  if(!docs.length)h+=emptyEl('📄','Hakuna hati','Ongeza vitambulisho na risiti');
  else h+='<div class="clist">'+docs.map(d=>`<div class="doccard"><div class="doc-name">${esc(d.name||'Hati')}</div>${d.type?'<div class="doc-type">'+esc(d.type)+'</div>':''} ${d.image?`<button class="sbtn sbt-b" onclick="viewImg('${d.id}','doc')">🖼️ Tazama</button>`:''}</div>`).join('')+'</div>';
  h+='</div>';

  h+=`<div class="divider"></div><button class="btn btn-rd" onclick="delTenant('${t.id}')">🗑️ Futa Mpangaji Huyu Kabisa</button>`;
  document.getElementById('detail-content').innerHTML=h;
}

function viewImg(id, type) {
  const t=tenants.find(x=>x.id===currentTenantId);
  if(!t)return;
  const src=type==='pay'?t.payments.find(p=>p.id===id)?.receiptImage:t.documents?.find(d=>d.id===id)?.image;
  if(src)window.open(src);
}

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tbt').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('on');
  const pane=document.getElementById('tab-'+tab);
  if(pane)pane.classList.add('active');
}

async function toggleLock(id) {
  const t=tenants.find(x=>x.id===id);
  if(!t)return;
  t.isLocked=!t.isLocked;
  await saveTenant(t);
  renderAll();
}

async function delTenant(id) {
  if(!confirm('Futa mpangaji huyu kabisa?'))return;
  const t=tenants.find(x=>x.id===id);
  if(t?.fbKey)await deleteTenantFromFB(t.fbKey);
  tenants=tenants.filter(x=>x.id!==id);
  localStorage.setItem('kodi_backup',JSON.stringify(tenants));
  showPage('home'); toast('Mpangaji amefutwa',true);
}

async function delPayment(pid) {
  if(!confirm('Futa malipo haya?'))return;
  const t=tenants.find(x=>x.id===currentTenantId);
  if(!t)return;
  t.payments=t.payments.filter(p=>p.id!==pid);
  await saveTenant(t);
  renderDetail(); toast('Malipo yamefutwa',true);
}

function editPayment(pid) {
  const t=tenants.find(x=>x.id===currentTenantId);
  openModal('editP',t?.payments.find(p=>p.id===pid));
}

/* ── EMAIL ── */
function tMail(t) {
  const s=getStatus(t),over=s.days<0;
  const sub=over?`Kodi Imedaiwa — Chumba ${t.room}`:`Ukumbusho wa Kodi — Chumba ${t.room}`;
  const body=over
    ?`Habari ${t.name},\n\nKodi yako ya Chumba ${t.room} imekwisha tangu ${fmt(s.exp)} (siku ${Math.abs(s.days)} zilizopita).\nKiasi: ${tsh(t.rentAmount)}/mwezi.\n\nTafadhali lipa haraka.\n\nAsante.`
    :`Habari ${t.name},\n\nKodi yako ya Chumba ${t.room} itakwisha ${fmt(s.exp)} (baada ya siku ${s.days}).\nKiasi: ${tsh(t.rentAmount)}/mwezi.\n\nTafadhali jitayarishe kulipa.\n\nAsante.`;
  return`mailto:${t.email||''}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
}
function oMail() {
  const exp=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<=7&&s.days>=0;});
  const owe=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<0;});
  const b=[`KodiManager — Ripoti\n`,exp.length?`⚠️ KARIBU KWISHA:`:null,...exp.map(t=>{const s=getStatus(t);return`  • ${t.name}, Chumba ${t.room}: ${fmt(s.exp)}`;}),owe.length?`\n🔴 WADAIWA:`:null,...owe.map(t=>{const s=getStatus(t);return`  • ${t.name}, Chumba ${t.room}: siku ${Math.abs(s.days)}`;})].filter(Boolean).join('\n');
  return`mailto:${cfg.ownerEmail||''}?subject=${encodeURIComponent('KodiManager — Ripoti')}&body=${encodeURIComponent(b)}`;
}

/* ── IMAGE ── */
function compressImg(file,maxW=450,q=0.55) {
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{const r=Math.min(maxW/img.width,1);const c=document.createElement('canvas');c.width=img.width*r;c.height=img.height*r;c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',q));};
    img.onerror=rej;img.src=url;
  });
}

function closeModal() {

async function handleImg(type,input) {
  const file=input.files[0]; if(!file)return;
  const zone=document.getElementById('uzone-'+type);
  const btn=document.getElementById('btn-'+type);
  zone.childNodes[0].disabled=true;
  zone.lastChild.textContent='⏳ Inapakia...';
  if(btn)btn.disabled=true;
  try{imgData[type]=await compressImg(file);zone.lastChild.textContent='✅ Picha imepakiwa';zone.classList.add('ok');}
  catch{zone.lastChild.textContent='❌ Imeshindwa';}
  zone.childNodes[0].disabled=false;
  if(btn)btn.disabled=false;
}

async function submitAddT() {
  const name=document.getElementById('f-name')?.value.trim();
  const phone=document.getElementById('f-phone')?.value.trim();
  const room=document.getElementById('f-room')?.value.trim();
  const rent=document.getElementById('f-rent')?.value;
  const date=document.getElementById('f-date')?.value;
  if(!name)return alert('Weka jina');if(!phone)return alert('Weka simu');
  if(!room)return alert('Weka chumba');if(!rent)return alert('Weka kodi');if(!date)return alert('Weka tarehe ya kuhamia');
  const t={id:uid(),name,phone,room,email:document.getElementById('f-email')?.value.trim()||'',rentAmount:rent,rentDuration:document.getElementById('f-dur')?.value||'1',moveInDate:date,notes:document.getElementById('f-notes')?.value.trim()||'',payments:[],documents:[],isLocked:false,createdAt:new Date().toISOString()};
  tenants.push(t);
  const ok=await saveTenant(t);
  if(ok){closeModal();renderAll();toast('✅ '+name+' amesajiliwa!');}
}

async function submitEditT() {
  const name=document.getElementById('f-name')?.value.trim();
  if(!name)return alert('Weka jina');
  const t=tenants.find(x=>x.id===currentTenantId);if(!t)return;
  Object.assign(t,{name,phone:document.getElementById('f-phone')?.value.trim()||'',room:document.getElementById('f-room')?.value.trim()||'',email:document.getElementById('f-email')?.value.trim()||'',rentAmount:document.getElementById('f-rent')?.value||'',rentDuration:document.getElementById('f-dur')?.value||'1',moveInDate:document.getElementById('f-date')?.value||'',notes:document.getElementById('f-notes')?.value.trim()||''});

}

async function submitAddP() {

async function submitAddD() {
