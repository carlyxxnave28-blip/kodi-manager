<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt=d=>d?new Date(d).toLocaleDateString("en-TZ",{day:"2-digit",month:"short",year:"numeric"}):"—";
const fmtTZS=n=>n?`TZS ${Number(n).toLocaleString()}`:"TZS 0";
const addMonths=(s,n)=>{const d=new Date(s);d.setMonth(d.getMonth()+parseInt(n));return d};
const daysFrom=s=>{if(!s)return null;const t=new Date();t.setHours(0,0,0,0);const e=new Date(s);e.setHours(0,0,0,0);return Math.floor((e-t)/86400000)};
const fileToB64=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)});

// FIXED: First payment due after first full period from move-in date
const getStatus=t=>{
  const anchor=t.moveInDate||t.createdAt;
  if(!anchor)return{label:"Hajalipa",color:"gray",days:null,expiry:null};
  const duration=parseInt(t.rentDuration)||1;
  const periods=t.payments?.length||0;
  // expiry = moveInDate + (periods paid + 1 if no payments) * duration
  // If no payments: first due date = moveInDate + duration (give one full period)
  // If has payments: expiry = moveInDate + periods * duration
  const expiry=periods===0
    ? addMonths(anchor, duration)  // first payment due after first period
    : addMonths(anchor, periods*duration);
  const days=daysFrom(expiry);
  if(t.isLocked)return{label:"Imefungwa",color:"red",days,expiry};
  if(days<0)return{label:"Imedaiwa",color:"red",days,expiry};
  if(days<=7)return{label:"Karibu Kwisha",color:"amber",days,expiry};
  if(periods===0)return{label:"Hajalipa",color:"gray",days,expiry};
  return{label:"Imelipiwa",color:"green",days,expiry};
};

const getRentPeriods=t=>{
  const anchor=t.moveInDate||t.createdAt;
  if(!anchor)return[];
  const duration=parseInt(t.rentDuration)||1;
  const totalPaid=t.payments?.length||0;
  const today=new Date();
  const periods=[];
  let i=0;
  while(i<Math.max(totalPaid,1)&&i<48){
    const start=addMonths(anchor,i*duration);
    const end=addMonths(anchor,(i+1)*duration);
    const payment=t.payments?.[i]||null;
    periods.push({num:i+1,start,end,payment});
    i++;
    if(i>=totalPaid&&end>today)break;
  }
  return periods;
};

const LS_KEY="kodimanager_v4";
const SET_KEY="kodimanager_settings_v2";
const load=()=>{try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]")}catch{return[]}};
const persist=arr=>{try{localStorage.setItem(LS_KEY,JSON.stringify(arr))}catch{}};
const loadSettings=()=>{try{return JSON.parse(localStorage.getItem(SET_KEY)||"{}")}catch{return{}}};
const saveSettings=s=>{try{localStorage.setItem(SET_KEY,JSON.stringify(s))}catch{}};

const makeTenantEmail=(tenant)=>{
  const s=getStatus(tenant);
  const isOverdue=s.days!==null&&s.days<0;
  const subject=isOverdue?`Kodi Imedaiwa - Chumba ${tenant.room}`:`Ukumbusho wa Kodi - Chumba ${tenant.room}`;
  const body=isOverdue
    ?`Habari ${tenant.name},\n\nKodi yako ya chumba ${tenant.room} imekwisha tangu ${fmt(s.expiry)} (siku ${Math.abs(s.days)} zilizopita).\nKiasi: ${fmtTZS(tenant.rentAmount)} kwa mwezi.\n\nTafadhali lipa haraka iwezekanavyo.\n\nAsante.`
    :`Habari ${tenant.name},\n\nHii ni ukumbusho kwamba kodi yako ya chumba ${tenant.room} itakwisha tarehe ${fmt(s.expiry)} (baada ya siku ${s.days}).\nKiasi: ${fmtTZS(tenant.rentAmount)} kwa mwezi.\n\nTafadhali jitayarishe kulipa kwa wakati.\n\nAsante.`;
  return`mailto:${tenant.email||""}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
};

const makeOwnerEmail=(settings,tenants)=>{
  const expiring=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<=7&&s.days>=0});
  const overdue=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<0});
  const lines=[`KodiManager - Ripoti ya Kodi\n`,
    expiring.length?`KARIBU KWISHA (${expiring.length}):`:null,
    ...expiring.map(t=>{const s=getStatus(t);return`- ${t.name} (Chumba ${t.room}): Inaisha ${fmt(s.expiry)}`}),
    overdue.length?`\nWADAIWA (${overdue.length}):`:null,
    ...overdue.map(t=>{const s=getStatus(t);return`- ${t.name} (Chumba ${t.room}): Imechelewa siku ${Math.abs(s.days)}`}),
  ].filter(Boolean).join("\n");
  return`mailto:${settings.ownerEmail||""}?subject=${encodeURIComponent("KodiManager - Ripoti ya Kodi")}&body=${encodeURIComponent(lines)}`;
};

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const [tenants,setTenants]=useState(()=>load());
  const [settings,setSettings]=useState(()=>loadSettings());
  const [view,setView]=useState("home");
  const [selectedId,setSelectedId]=useState(null);
  const [modal,setModal]=useState(null);
  const [modalCtx,setModalCtx]=useState(null);
  const [notifPerm,setNotifPerm]=useState("default");
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState("");

  useEffect(()=>{if("Notification"in window)setNotifPerm(Notification.permission)},[]);

  const save=arr=>{setTenants(arr);persist(arr)};
  const updSettings=s=>{setSettings(s);saveSettings(s)};
  const toast$=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)};

  // Auto-lock >7 days overdue
  useEffect(()=>{
    if(!tenants.length)return;
    let chg=false;
    const upd=tenants.map(t=>{
      const s=getStatus(t);
      if(s.days!==null&&s.days<-7&&!t.isLocked){chg=true;return{...t,isLocked:true}}
      return t;
    });
    if(chg)save(upd);
  });

  // Browser notifications
  useEffect(()=>{
    if(notifPerm!=="granted"||!tenants.length)return;
    const seen=JSON.parse(localStorage.getItem("kodi_notif5")||"{}");
    const today=new Date().toDateString();
    tenants.forEach(t=>{
      const s=getStatus(t);
      if(s.days!==null&&s.days<=7&&s.days>=0&&seen[t.id]!==today){
        new Notification(`🏠 KodiManager: ${t.name}`,{body:`Kodi inaisha ${s.days===0?"leo":`baada ya siku ${s.days}`} — ${fmt(s.expiry)}`});
        seen[t.id]=today;
      }
    });
    localStorage.setItem("kodi_notif5",JSON.stringify(seen));
  },[tenants,notifPerm]);

  const addTenant=data=>{
    const t={id:Date.now().toString(),...data,payments:[],documents:[],isLocked:false,createdAt:new Date().toISOString()};
    save([...tenants,t]);setModal(null);toast$(`${data.name} amesajiliwa! ✅`);
  };
  const editTenant=(tId,data)=>{
    save(tenants.map(t=>t.id===tId?{...t,...data}:t));
    setModal(null);toast$("Maelezo yamesasishwa! ✏️");
  };
  const addPayment=(tId,data)=>{
    save(tenants.map(t=>t.id===tId?{...t,payments:[...t.payments,{id:Date.now().toString(),...data}]}:t));
    setModal(null);toast$("Malipo yamehifadhiwa! 💳");
  };
  const editPayment=(tId,payId,data)=>{
    save(tenants.map(t=>t.id===tId?{...t,payments:t.payments.map(p=>p.id===payId?{...p,...data}:p)}:t));
    setModal(null);toast$("Malipo yamesasishwa! ✏️");
  };
  const deletePayment=(tId,payId)=>{
    if(!confirm("Futa malipo haya?"))return;
    save(tenants.map(t=>t.id===tId?{...t,payments:t.payments.filter(p=>p.id!==payId)}:t));
    toast$("Malipo yamefutwa","err");
  };
  const addDoc=(tId,data)=>{
    save(tenants.map(t=>t.id===tId?{...t,documents:[...(t.documents||[]),{id:Date.now().toString(),...data}]}:t));
    setModal(null);toast$("Hati imehifadhiwa! 📄");
  };
  const toggleLock=tId=>save(tenants.map(t=>t.id===tId?{...t,isLocked:!t.isLocked}:t));
  const deleteTenant=tId=>{
    if(!confirm("Una uhakika? Mpangaji atafutwa kabisa."))return;
    save(tenants.filter(t=>t.id!==tId));setSelectedId(null);toast$("Mpangaji amefutwa","err");
  };
  const resetAll=()=>{
    if(!confirm("ONYO: Data yote itafutwa kabisa. Una uhakika?"))return;
    if(!confirm("Bonyeza OK tena kuthibitisha — hii haiwezi kurudishwa."))return;
    save([]);setSelectedId(null);setView("home");setModal(null);toast$("Data yote imefutwa","err");
  };

  const selected=tenants.find(t=>t.id===selectedId);
  const defaulters=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<0});
  const expiringSoon=tenants.filter(t=>{const s=getStatus(t);return s.days!==null&&s.days<=7&&s.days>=0});
  const filtered=tenants.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||t.room.toLowerCase().includes(search.toLowerCase()));

  return(
    <>
      {toast&&<div className={`toast ${toast.type==="err"?"toast-err":"toast-ok"}`}>{toast.msg}</div>}
      <div className="app">
        <header className="header">
          <div className="header-inner">
            <div className="brand">
              <div className="brand-icon">🏠</div>
              <div>
                <div className="brand-name">KodiManager</div>
                <div className="brand-sub">{tenants.length} wapangaji · {defaulters.length} wadaiwa</div>
              </div>
            </div>
            <div className="header-actions">
              {notifPerm!=="granted"&&(
                <button className="notif-btn" onClick={async()=>{
                  if("Notification"in window)setNotifPerm(await Notification.requestPermission());
                }}>🔔 Arifa</button>
              )}
              <button className="icon-btn" onClick={()=>setModal("settings")} title="Mipangilio">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
            </div>
          </div>
        </header>

        <main className="main">
          {selected?(
            <TenantDetail tenant={selected} settings={settings}
              onBack={()=>setSelectedId(null)}
              onEdit={()=>{setModalCtx(selected);setModal("editTenant")}}
              onAddPayment={()=>{setModalCtx({tenantId:selected.id});setModal("pay")}}
              onEditPayment={(p)=>{setModalCtx({tenantId:selected.id,payment:p});setModal("editPay")}}
              onDeletePayment={(payId)=>deletePayment(selected.id,payId)}
              onAddDoc={()=>{setModalCtx(selected.id);setModal("doc")}}
              onToggleLock={()=>toggleLock(selected.id)}
              onDelete={()=>deleteTenant(selected.id)}/>
          ):view==="home"?(
            <HomeView tenants={filtered} allTenants={tenants} expiringSoon={expiringSoon} search={search} setSearch={setSearch} onSelect={setSelectedId} settings={settings}/>
          ):view==="overview"?(
            <OverviewView tenants={filtered} search={search} setSearch={setSearch} onSelect={setSelectedId}/>
          ):(
            <DefaultersView tenants={defaulters} onSelect={setSelectedId} onToggleLock={toggleLock}/>
          )}
        </main>

        {!selected&&(
          <button className="fab" onClick={()=>setModal("tenant")}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        )}

        {!selected&&(
          <nav className="bottom-nav">
            <NavBtn label="Nyumbani" active={view==="home"} onClick={()=>setView("home")}
              icon={<svg width="22" height="22" viewBox="0 0 24 24" fill={view==="home"?"#10b981":"none"} stroke={view==="home"?"#10b981":"#6b7280"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>}/>
            <NavBtn label="Maelezo" active={view==="overview"} onClick={()=>setView("overview")}
              icon={<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={view==="overview"?"#10b981":"#6b7280"} strokeWidth="2" strokeLinecap="round"><rect x="2" y="7" width="4" height="15"/><rect x="10" y="3" width="4" height="19"/><rect x="18" y="11" width="4" height="11"/></svg>}/>
            <NavBtn label="Wadaiwa" active={view==="defaulters"} onClick={()=>setView("defaulters")} badge={defaulters.length}
              icon={<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={view==="defaulters"?"#ef4444":"#6b7280"} strokeWidth="2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>}/>
          </nav>
        )}
      </div>

      {modal==="tenant"&&<AddTenantModal onAdd={addTenant} onClose={()=>setModal(null)}/>}
      {modal==="editTenant"&&<EditTenantModal tenant={modalCtx} onSave={(id,data)=>editTenant(id,data)} onClose={()=>setModal(null)}/>}
      {modal==="pay"&&<AddPaymentModal ctx={modalCtx} onAdd={addPayment} onClose={()=>setModal(null)}/>}
      {modal==="editPay"&&<EditPaymentModal ctx={modalCtx} onSave={editPayment} onClose={()=>setModal(null)}/>}
      {modal==="doc"&&<AddDocModal tenantId={modalCtx} onAdd={addDoc} onClose={()=>setModal(null)}/>}
      {modal==="settings"&&<SettingsModal settings={settings} tenants={tenants} onSave={s=>{updSettings(s);setModal(null);toast$("Mipangilio imehifadhiwa! ⚙️")}} onReset={resetAll} onClose={()=>setModal(null)}/>}
    </>
  );
}

function NavBtn({label,active,onClick,icon,badge}){
  return(
    <button className={`nav-btn${active?" active":""}`} onClick={onClick}>
      <div style={{position:"relative",display:"inline-block"}}>
        {icon}
        {badge>0&&<span className="nav-badge">{badge}</span>}
      </div>
      <span>{label}</span>
    </button>
  );
}

function HomeView({tenants,allTenants,expiringSoon,search,setSearch,onSelect,settings}){
  const st=[
    {label:"Wanaolipa",value:allTenants.filter(t=>getStatus(t).color==="green").length,color:"#10b981",icon:"✅"},
    {label:"Karibu Kwisha",value:allTenants.filter(t=>getStatus(t).color==="amber").length,color:"#f59e0b",icon:"⚠️"},
    {label:"Wadaiwa",value:allTenants.filter(t=>getStatus(t).color==="red").length,color:"#ef4444",icon:"🔴"},
    {label:"Wapangaji",value:allTenants.length,color:"#818cf8",icon:"👥"},
  ];
  return(
    <div className="view slide-up">
      <div className="stats-grid">
        {st.map(s=>(
          <div key={s.label} className="stat-card" style={{"--accent":s.color}}>
            <span className="stat-icon">{s.icon}</span>
            <span className="stat-val">{s.value}</span>
            <span className="stat-label">{s.label}</span>
          </div>
        ))}
      </div>
      {expiringSoon.length>0&&(
        <div className="alert-banner">
          <div className="alert-title">⚠️ Kodi Karibu Kwisha ({expiringSoon.length})</div>
          {expiringSoon.map(t=>{
            const s=getStatus(t);
            return(
              <div key={t.id} className="alert-item">
                <span>{t.name} — siku {s.days} zimebaki</span>
                {t.email&&<button className="alert-mail" onClick={()=>window.open(makeTenantEmail(t))}>📧 Tuma</button>}
              </div>
            );
          })}
          {settings.ownerEmail&&(
            <button className="alert-mail" style={{marginTop:4}} onClick={()=>window.open(makeOwnerEmail(settings,allTenants))}>
              📧 Ripoti kwangu
            </button>
          )}
        </div>
      )}
      <SearchBar value={search} onChange={setSearch} placeholder="Tafuta jina au chumba..."/>
      <div>
        <div className="section-title">Wapangaji Wote</div>
        <div className="section-sub">Gusa kadi kuona maelezo kamili</div>
      </div>
      {tenants.length===0?<Empty icon="🏘️" title="Hakuna wapangaji" sub='Gusa "+" hapa chini kuongeza mpangaji'/>:
        <div className="card-list">{tenants.map(t=><TenantCard key={t.id} tenant={t} onClick={()=>onSelect(t.id)}/>)}</div>}
    </div>
  );
}

function OverviewView({tenants,search,setSearch,onSelect}){
  return(
    <div className="view slide-up">
      <div>
        <div className="section-title">Maelezo ya Wote</div>
        <div className="section-sub">Rekodi kamili ya kila mpangaji</div>
      </div>
      <SearchBar value={search} onChange={setSearch} placeholder="Tafuta mpangaji..."/>
      {tenants.length===0?<Empty icon="📋" title="Hakuna wapangaji" sub="Anza kwa kuongeza wapangaji"/>:
        <div className="card-list">{tenants.map(t=><OverviewCard key={t.id} tenant={t} onClick={()=>onSelect(t.id)}/>)}</div>}
    </div>
  );
}

function DefaultersView({tenants,onSelect,onToggleLock}){
  return(
    <div className="view slide-up">
      <div>
        <div className="section-title" style={{color:"#ef4444"}}>⚠️ Wadaiwa</div>
        <div className="section-sub">Wapangaji ambao muda wa kodi umekwisha</div>
      </div>
      {tenants.length===0?<Empty icon="🎉" title="Hakuna wadaiwa!" sub="Wapangaji wote wanalipa kwa wakati — hongera!"/>:
        <div className="card-list">{tenants.map(t=><DefaulterCard key={t.id} tenant={t} onSelect={()=>onSelect(t.id)} onToggleLock={()=>onToggleLock(t.id)}/>)}</div>}
    </div>
  );
}

function TenantDetail({tenant,settings,onBack,onEdit,onAddPayment,onEditPayment,onDeletePayment,onAddDoc,onToggleLock,onDelete}){
  const [tab,setTab]=useState("payments");
  const s=getStatus(tenant);
  const totalPaid=tenant.payments.reduce((x,p)=>x+(parseFloat(p.amount)||0),0);
  const isOverdue=s.days!==null&&s.days<0;
  const periods=getRentPeriods(tenant);
  const duration=parseInt(tenant.rentDuration)||1;
  const anchor=tenant.moveInDate||tenant.createdAt;
  const msPerMonth=30.44*24*60*60*1000;
  const monthsElapsed=anchor?Math.max(0,(new Date()-new Date(anchor))/msPerMonth):0;
  const periodsElapsed=Math.ceil(monthsElapsed/duration);
  const periodsPaid=tenant.payments.length;
  const periodsOwed=Math.max(0,periodsElapsed-periodsPaid);
  const debtAmount=periodsOwed*(parseFloat(tenant.rentAmount)||0);

  return(
    <div className="view slide-up">
      <button className="back-btn" onClick={onBack}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Rudi
      </button>
      <div className="detail-header">
        <div className="detail-avatar">{tenant.name[0].toUpperCase()}</div>
        <div className="detail-info">
          <div className="detail-name">{tenant.name} {tenant.isLocked?"🔒":""}</div>
          <div className="detail-room">Chumba {tenant.room}{tenant.phone?` · ${tenant.phone}`:""}</div>
          <span className={`tag tag-${s.color}`}>{s.label}</span>
        </div>
      </div>
      <div className="info-grid">
        <Chip label="📞 Simu" value={tenant.phone||"—"}/>
        <Chip label="💰 Kodi/Mwezi" value={fmtTZS(tenant.rentAmount)} color="#10b981"/>
        <Chip label="📅 Alihamia" value={fmt(tenant.moveInDate)} color="#818cf8"/>
        <Chip label="✅ Imelipiwa" value={fmtTZS(totalPaid)} color="#10b981"/>
        {tenant.email&&<Chip label="📧 Email" value={tenant.email}/>}
        <Chip label="📋 Vipindi" value={`${periodsPaid} / ${Math.max(periodsPaid,periodsElapsed)}`}/>
      </div>
      {s.expiry&&(
        <div className={`expiry-bar ${isOverdue?"eb-red":s.color==="amber"?"eb-amber":s.color==="gray"?"eb-gray":"eb-green"}`}>
          <span>{isOverdue?`⚠️ Imekwisha — siku ${Math.abs(s.days)} zilizopita`:s.days===0?"⏰ Inaisha leo":s.color==="gray"?`📅 Malipo ya kwanza inatakiwa`:`📅 Siku ${s.days} zimebaki`}</span>
          <span style={{fontWeight:700,flexShrink:0}}>{fmt(s.expiry)}</span>
        </div>
      )}
      {debtAmount>0&&(
        <div className="debt-bar">
          <span>📛 Deni: vipindi {periodsOwed} · {fmtTZS(debtAmount)}</span>
          {tenant.isLocked&&<span className="locked-badge">🔒 Imefungwa</span>}
        </div>
      )}
      {tenant.email&&(
        <a href={makeTenantEmail(tenant)} className="btn-email">
          📧 Tuma {isOverdue?"Notisi ya Deni":"Ukumbusho"} kwa {tenant.name}
        </a>
      )}
      <div className="action-row">
        <button className="btn-primary" onClick={onAddPayment}>+ Ongeza Malipo</button>
        <button className={`btn-lock ${tenant.isLocked?"btn-lock-u":"btn-lock-l"}`} onClick={onToggleLock}>
          {tenant.isLocked?"🔓 Fungua":"🔒 Funga"}
        </button>
      </div>
      <button className="btn-edit" onClick={onEdit}>✏️ Hariri Maelezo ya Mpangaji</button>
      <div className="tabs">
        <button className={`tab${tab==="payments"?" tab-active":""}`} onClick={()=>setTab("payments")}>💳 Malipo ({tenant.payments.length})</button>
        <button className={`tab${tab==="periods"?" tab-active":""}`} onClick={()=>setTab("periods")}>📅 Vipindi</button>
        <button className={`tab${tab==="docs"?" tab-active":""}`} onClick={()=>setTab("docs")}>📄 Hati ({(tenant.documents||[]).length})</button>
      </div>
      {tab==="payments"&&(
        tenant.payments.length===0?<Empty icon="💳" title="Hakuna malipo bado" sub="Gusa 'Ongeza Malipo' kurekodi malipo"/>:
        <div className="card-list">
          {[...tenant.payments].reverse().map((p,i)=>(
            <div key={p.id} className="payment-card">
              <div className="payment-top">
                <div style={{flex:1,minWidth:0}}>
                  <div className="payment-amount">{fmtTZS(p.amount)}</div>
                  <div className="payment-date">Tarehe ya malipo: {fmt(p.date)}</div>
                  {p.notes&&<div className="payment-note">{p.notes}</div>}
                </div>
                <div className="payment-right">
                  {p.receiptNo&&<div className="receipt-no">#{p.receiptNo}</div>}
                  <div className="receipt-num">Malipo {tenant.payments.length-i}</div>
                  <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
                    {p.receiptImage&&<button className="small-btn small-btn-blue" onClick={()=>window.open(p.receiptImage)}>📄 Risiti</button>}
                    <button className="small-btn small-btn-amber" onClick={()=>onEditPayment(p)}>✏️ Edit</button>
                    <button className="small-btn small-btn-red" onClick={()=>onDeletePayment(p.id)}>🗑️</button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab==="periods"&&(
        <div>
          <div style={{fontSize:"0.75rem",color:"#6b7280",marginBottom:8}}>Kodi inahesabiwa kutoka siku ya kuhamia ({fmt(tenant.moveInDate)}). Malipo ya late hayabadilishi mzunguko.</div>
          {periods.length===0?<Empty icon="📅" title="Weka tarehe ya kuhamia" sub="Tarehe ya kuhamia inahitajika"/>:
          periods.map(per=>(
            <div key={per.num} className="period-row">
              <span className="period-label">Kipindi {per.num}: {fmt(per.start)} – {fmt(per.end)}</span>
              {per.payment?<span className="period-paid">✅ {fmtTZS(per.payment.amount)}</span>:<span className="period-due">❌ Haijalipiwa</span>}
            </div>
          ))}
        </div>
      )}
      {tab==="docs"&&(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          <button className="btn-ghost" onClick={onAddDoc}>+ Ongeza Hati / Kitambulisho</button>
          {(tenant.documents||[]).length===0?<Empty icon="📄" title="Hakuna hati" sub="Ongeza nakala za vitambulisho"/>:
          <div className="card-list">
            {tenant.documents.map(d=>(
              <div key={d.id} className="doc-card">
                <div className="doc-name">{d.name||"Hati"}</div>
                {d.type&&<div className="doc-type">{d.type}</div>}
                {d.image&&<button className="small-btn small-btn-blue" style={{marginTop:4}} onClick={()=>window.open(d.image)}>🖼️ Tazama Hati</button>}
              </div>
            ))}
          </div>}
        </div>
      )}
      <div className="divider"/>
      <button className="btn-delete" onClick={onDelete}>🗑️ Futa Mpangaji Huyu</button>
    </div>
  );
}

function TenantCard({tenant,onClick}){
  const s=getStatus(tenant);
  const cc={green:"#10b981",amber:"#f59e0b",red:"#ef4444",gray:"#6b7280"};
  const c=cc[s.color];
  return(
    <div className="card" style={{"--left":c,cursor:"pointer"}} onClick={onClick}>
      <div className="card-row">
        <div className="avatar" style={{background:`${c}22`,color:c,border:`1px solid ${c}44`}}>{tenant.name[0].toUpperCase()}</div>
        <div className="card-info">
          <div className="card-name">{tenant.name} {tenant.isLocked?"🔒":""}</div>
          <div className="card-sub">Chumba {tenant.room} · {tenant.phone}</div>
        </div>
        <span className={`tag tag-${s.color}`}>{s.label}</span>
      </div>
      <div className="card-dates">
        <div className="date-box"><div className="date-label">Alihamia</div><div className="date-val">{fmt(tenant.moveInDate)}</div></div>
        <div className="date-box"><div className="date-label">Kodi Inaisha</div><div className="date-val" style={{color:c}}>{s.expiry?fmt(s.expiry):"—"}</div></div>
      </div>
    </div>
  );
}

function OverviewCard({tenant,onClick}){
  const s=getStatus(tenant);
  const total=tenant.payments.reduce((x,p)=>x+(parseFloat(p.amount)||0),0);
  return(
    <div className="card" onClick={onClick} style={{cursor:"pointer"}}>
      <div className="card-row" style={{marginBottom:10}}>
        <div className="avatar" style={{background:"#818cf822",color:"#818cf8",border:"1px solid #818cf844"}}>{tenant.name[0].toUpperCase()}</div>
        <div className="card-info">
          <div className="card-name">{tenant.name} {tenant.isLocked?"🔒":""}</div>
          <div className="card-sub">Chumba {tenant.room} · Alihamia {fmt(tenant.moveInDate)}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" style={{flexShrink:0}}><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div className="info-grid" style={{gap:6}}>
        <Chip label="Kodi/Mwezi" value={fmtTZS(tenant.rentAmount)} color="#10b981" sm/>
        <Chip label="Malipo" value={`${tenant.payments.length} risiti`} color="#818cf8" sm/>
        <Chip label="Jumla Lilipiwa" value={fmtTZS(total)} color="#10b981" sm/>
        <Chip label="Hali" value={s.label} color={s.color==="green"?"#10b981":s.color==="amber"?"#f59e0b":s.color==="red"?"#ef4444":"#9ca3af"} sm/>
      </div>
    </div>
  );
}

function DefaulterCard({tenant,onSelect,onToggleLock}){
  const s=getStatus(tenant);
  return(
    <div className="card" style={{"--left":"#ef4444"}}>
      <div className="card-row" style={{marginBottom:10}}>
        <div className="avatar" style={{background:"#ef444422",color:"#ef4444",border:"1px solid #ef444444"}}>{tenant.name[0].toUpperCase()}</div>
        <div className="card-info">
          <div className="card-name">{tenant.name}</div>
          <div className="card-sub">Chumba {tenant.room} · {tenant.phone}</div>
        </div>
        <span className="tag tag-red" style={{flexShrink:0}}>{tenant.isLocked?"🔒":""} Siku {Math.abs(s.days)}</span>
      </div>
      <div className="info-grid" style={{gap:6,marginBottom:10}}>
        <Chip label="Kodi Iliisha" value={fmt(s.expiry)} color="#ef4444" sm/>
        <Chip label="Imechelewa" value={`Siku ${Math.abs(s.days)}`} color="#ef4444" sm/>
      </div>
      {tenant.email&&(
        <a href={makeTenantEmail(tenant)} className="btn-email" style={{marginBottom:8,fontSize:"0.83rem",padding:"10px"}}>
          📧 Tuma Notisi kwa {tenant.name}
        </a>
      )}
      <div className="action-row">
        <button className="btn-ghost" onClick={onSelect}>Maelezo</button>
        <button className={`btn-lock ${tenant.isLocked?"btn-lock-u":"btn-lock-l"}`} onClick={onToggleLock}>
          {tenant.isLocked?"🔓 Fungua":"🔒 Funga"}
        </button>
      </div>
    </div>
  );
}

function Chip({label,value,color,sm}){
  return(
    <div className={`chip${sm?" chip-sm":""}`}>
      <div className="chip-label">{label}</div>
      <div className="chip-val" style={{color:color||"#f1f5f9"}}>{value}</div>
    </div>
  );
}
function Empty({icon,title,sub}){
  return(<div className="empty"><div className="empty-icon">{icon}</div><div className="empty-title">{title}</div><div className="empty-sub">{sub}</div></div>);
}
function SearchBar({value,onChange,placeholder}){
  return(
    <div className="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" strokeWidth="2" strokeLinecap="round" style={{flexShrink:0}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input className="search-input" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal slide-up" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{title}</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Field({label,hint,children}){
  return(
    <div className="field">
      <label className="field-label">{label}</label>
      {children}
      {hint&&<span className="inp-hint">{hint}</span>}
    </div>
  );
}

// ── MODALS ────────────────────────────────────────────────────────────────
function AddTenantModal({onAdd,onClose}){
  const today=new Date().toISOString().split("T")[0];
  const [f,setF]=useState({name:"",phone:"",email:"",room:"",rentAmount:"",rentDuration:"1",moveInDate:today,notes:""});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!f.name.trim())return alert("Weka jina la mpangaji");
    if(!f.phone.trim())return alert("Weka nambari ya simu");
    if(!f.room.trim())return alert("Weka nambari ya chumba");
    if(!f.rentAmount)return alert("Weka kiasi cha kodi");
    if(!f.moveInDate)return alert("Weka tarehe ya kuhamia");
    onAdd(f);
  };
  return(
    <Modal title="➕ Sajili Mpangaji Mpya" onClose={onClose}>
      <Field label="Jina Kamili *"><input className="inp" placeholder="Mfano: John Kamau" value={f.name} onChange={e=>s("name",e.target.value)}/></Field>
      <div className="inp-row">
        <Field label="Simu *"><input className="inp" placeholder="0712345678" type="tel" value={f.phone} onChange={e=>s("phone",e.target.value)}/></Field>
        <Field label="Chumba *"><input className="inp" placeholder="A1" value={f.room} onChange={e=>s("room",e.target.value)}/></Field>
      </div>
      <Field label="Email ya Mpangaji"><input className="inp" placeholder="john@gmail.com" type="email" value={f.email} onChange={e=>s("email",e.target.value)}/></Field>
      <div className="inp-row">
        <Field label="Kodi/Mwezi (TZS) *"><input className="inp" placeholder="200000" type="number" value={f.rentAmount} onChange={e=>s("rentAmount",e.target.value)}/></Field>
        <Field label="Muda wa Kodi">
          <select className="inp" value={f.rentDuration} onChange={e=>s("rentDuration",e.target.value)}>
            {[1,2,3,6,12].map(m=><option key={m} value={m}>{m} {m===1?"Mwezi":"Miezi"}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Tarehe ya Kuhamia *" hint="⚠️ Kodi itahesabiwa kutoka tarehe hii — si tarehe ya malipo">
        <input className="inp" type="date" value={f.moveInDate} onChange={e=>s("moveInDate",e.target.value)}/>
      </Field>
      <Field label="Maelezo"><textarea className="inp" rows={2} style={{resize:"none"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={submit}>Sajili</button>
      </div>
    </Modal>
  );
}

function EditTenantModal({tenant,onSave,onClose}){
  const [f,setF]=useState({
    name:tenant.name||"",phone:tenant.phone||"",email:tenant.email||"",
    room:tenant.room||"",rentAmount:tenant.rentAmount||"",
    rentDuration:tenant.rentDuration||"1",moveInDate:tenant.moveInDate||"",notes:tenant.notes||""
  });
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!f.name.trim())return alert("Weka jina");
    onSave(tenant.id,f);
  };
  return(
    <Modal title="✏️ Hariri Maelezo ya Mpangaji" onClose={onClose}>
      <Field label="Jina Kamili"><input className="inp" value={f.name} onChange={e=>s("name",e.target.value)}/></Field>
      <div className="inp-row">
        <Field label="Simu"><input className="inp" type="tel" value={f.phone} onChange={e=>s("phone",e.target.value)}/></Field>
        <Field label="Chumba"><input className="inp" value={f.room} onChange={e=>s("room",e.target.value)}/></Field>
      </div>
      <Field label="Email"><input className="inp" type="email" value={f.email} onChange={e=>s("email",e.target.value)}/></Field>
      <div className="inp-row">
        <Field label="Kodi/Mwezi (TZS)"><input className="inp" type="number" value={f.rentAmount} onChange={e=>s("rentAmount",e.target.value)}/></Field>
        <Field label="Muda wa Kodi">
          <select className="inp" value={f.rentDuration} onChange={e=>s("rentDuration",e.target.value)}>
            {[1,2,3,6,12].map(m=><option key={m} value={m}>{m} {m===1?"Mwezi":"Miezi"}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Tarehe ya Kuhamia" hint="Kubadilisha hii kutabadilisha mzunguko wote wa kodi">
        <input className="inp" type="date" value={f.moveInDate} onChange={e=>s("moveInDate",e.target.value)}/>
      </Field>
      <Field label="Maelezo"><textarea className="inp" rows={2} style={{resize:"none"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={submit}>Hifadhi</button>
      </div>
    </Modal>
  );
}

function AddPaymentModal({ctx,onAdd,onClose}){
  const [f,setF]=useState({date:new Date().toISOString().split("T")[0],amount:"",receiptNo:"",notes:"",receiptImage:null});
  const [uploading,setUploading]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleImg=async e=>{const file=e.target.files[0];if(!file)return;setUploading(true);try{s("receiptImage",await fileToB64(file))}catch{}setUploading(false)};
  const submit=()=>{if(!f.amount)return alert("Weka kiasi cha malipo");onAdd(ctx.tenantId,f)};
  return(
    <Modal title="💳 Rekodi Malipo" onClose={onClose}>
      <div className="inp-row">
        <Field label="Kiasi (TZS) *"><input className="inp" placeholder="200000" type="number" value={f.amount} onChange={e=>s("amount",e.target.value)}/></Field>
        <Field label="Tarehe ya Malipo"><input className="inp" type="date" value={f.date} onChange={e=>s("date",e.target.value)}/></Field>
      </div>
      <Field label="Nambari ya Risiti"><input className="inp" placeholder="RCP-001" value={f.receiptNo} onChange={e=>s("receiptNo",e.target.value)}/></Field>
      <Field label="Picha ya Risiti (hiari)">
        <label className="upload-zone">
          {uploading?"⏳ Inapakia...":f.receiptImage?"✅ Picha imepakiwa":"📎 Gusa kupakia picha ya risiti"}
          <input type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
        </label>
      </Field>
      <Field label="Maelezo"><input className="inp" placeholder="Kodi ya Januari 2025..." value={f.notes} onChange={e=>s("notes",e.target.value)}/></Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={submit}>Hifadhi</button>
      </div>
    </Modal>
  );
}

function EditPaymentModal({ctx,onSave,onClose}){
  const p=ctx.payment;
  const [f,setF]=useState({date:p.date,amount:p.amount,receiptNo:p.receiptNo||"",notes:p.notes||""});
  const s=(k,v)=>setF(prev=>({...prev,[k]:v}));
  const submit=()=>{if(!f.amount)return alert("Weka kiasi");onSave(ctx.tenantId,p.id,f)};
  return(
    <Modal title="✏️ Hariri Malipo" onClose={onClose}>
      <div className="inp-row">
        <Field label="Kiasi (TZS) *"><input className="inp" type="number" value={f.amount} onChange={e=>s("amount",e.target.value)}/></Field>
        <Field label="Tarehe ya Malipo"><input className="inp" type="date" value={f.date} onChange={e=>s("date",e.target.value)}/></Field>
      </div>
      <Field label="Nambari ya Risiti"><input className="inp" value={f.receiptNo} onChange={e=>s("receiptNo",e.target.value)}/></Field>
      <Field label="Maelezo"><input className="inp" value={f.notes} onChange={e=>s("notes",e.target.value)}/></Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={submit}>Hifadhi</button>
      </div>
    </Modal>
  );
}

function AddDocModal({tenantId,onAdd,onClose}){
  const [f,setF]=useState({name:"",type:"Kitambulisho cha Taifa",image:null});
  const [uploading,setUploading]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleImg=async e=>{const file=e.target.files[0];if(!file)return;setUploading(true);try{s("image",await fileToB64(file))}catch{}setUploading(false)};
  const submit=()=>{if(!f.image)return alert("Pakia picha ya hati kwanza");onAdd(tenantId,{...f,uploadedAt:new Date().toISOString()})};
  return(
    <Modal title="📄 Ongeza Hati" onClose={onClose}>
      <Field label="Aina ya Hati">
        <select className="inp" value={f.type} onChange={e=>s("type",e.target.value)}>
          {["Kitambulisho cha Taifa","Cheki ya Benki","Risiti ya Malipo","Mkataba wa Kukodisha","Kadi ya Chuo","Nyaraka Nyingine"].map(o=><option key={o}>{o}</option>)}
        </select>
      </Field>
      <Field label="Jina la Hati"><input className="inp" placeholder="ID ya John" value={f.name} onChange={e=>s("name",e.target.value)}/></Field>
      <Field label="Picha ya Hati *">
        <label className="upload-zone">
          {uploading?"⏳ Inapakia...":f.image?"✅ Picha imepakiwa":"📎 Gusa kupakia picha ya hati"}
          <input type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
        </label>
      </Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={submit}>Hifadhi</button>
      </div>
    </Modal>
  );
}

function SettingsModal({settings,tenants,onSave,onReset,onClose}){
  const [f,setF]=useState({ownerName:settings.ownerName||"",ownerEmail:settings.ownerEmail||"",ownerPhone:settings.ownerPhone||""});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const expiring=tenants.filter(t=>{const st=getStatus(t);return st.days!==null&&st.days<=7&&st.days>=0});
  const overdue=tenants.filter(t=>{const st=getStatus(t);return st.days!==null&&st.days<0});
  return(
    <Modal title="⚙️ Mipangilio" onClose={onClose}>
      <Field label="Jina Lako"><input className="inp" placeholder="Jina la Mwenye Nyumba" value={f.ownerName} onChange={e=>s("ownerName",e.target.value)}/></Field>
      <Field label="Nambari Yako ya Simu"><input className="inp" placeholder="0712345678" type="tel" value={f.ownerPhone} onChange={e=>s("ownerPhone",e.target.value)}/></Field>
      <Field label="Email Yako" hint="Itatumika kupata ripoti ya wapangaji kwa email">
        <input className="inp" placeholder="wewe@gmail.com" type="email" value={f.ownerEmail} onChange={e=>s("ownerEmail",e.target.value)}/>
      </Field>
      {(expiring.length>0||overdue.length>0)&&f.ownerEmail&&(
        <a href={makeOwnerEmail({...settings,...f},tenants)} className="btn-email">
          📧 Tuma Ripoti Sasa ({expiring.length} karibu + {overdue.length} wadaiwa)
        </a>
      )}
      <div className="info-note">
        <b>💡 Jinsi Arifa Zinavyofanya Kazi</b><br/>
        • Browser notifications — zinafanya kazi kiotomatiki<br/>
        • Gusa 🔔 "Arifa" juu kuziwezesha<br/>
        • Email — gusa kitufe cha 📧 kwenye kadi ya mpangaji<br/>
        • Weka email ya mpangaji wakati wa kusajili ili aweze kupata notisi
      </div>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose}>Ghairi</button>
        <button className="btn-primary" onClick={()=>onSave(f)}>Hifadhi</button>
      </div>
      <div className="divider"/>
      <button className="reset-btn" onClick={()=>{onClose();setTimeout(onReset,300)}}>
        🗑️ Futa Data Yote na Anza Upya
      </button>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
